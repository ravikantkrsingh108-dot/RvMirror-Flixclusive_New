name: Build

concurrency:
  group: build
  cancel-in-progress: true

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths-ignore:
      - "*.md"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 9.5.0

      - name: Build provider
        run: gradle make generateUpdaterJson --no-daemon

      - name: Verify provider package
        run: |
          python - <<'PY'
          from pathlib import Path
          from zipfile import ZipFile

          flx_files = list(Path("providers/RvMirror/build").glob("*.flx"))
          if not flx_files:
              raise SystemExit("No RvMirror .flx file was generated")

          if not any(flx.name == "RvMirrorFresh.flx" for flx in flx_files):
              raise SystemExit("Expected a cache-busting RvMirrorFresh.flx artifact, got: " + ", ".join(flx.name for flx in flx_files))

          flx = next(flx for flx in flx_files if flx.name == "RvMirrorFresh.flx")
          with ZipFile(flx) as archive:
              names = archive.namelist()
              print("Generated", flx)
              print("Entries:", names)

              if "manifest.json" not in names:
                  raise SystemExit("manifest.json is missing from the provider package")

              manifest = archive.read("manifest.json").decode("utf-8")
              print(manifest)

              dex_names = [name for name in names if name.startswith("classes") and name.endswith(".dex")]
              if not dex_names:
                  raise SystemExit("No classes.dex file was generated in the provider package")

              dex = b"".join(archive.read(name) for name in dex_names)

          required_classes = [
              b"Lcom/flixclusive/provider/rvmirror/RvMirror;",
              b"Lcom/rvmirror/provider/RvMirror;",
          ]
          missing = [klass.decode("ascii") for klass in required_classes if klass not in dex]
          if missing:
              raise SystemExit("Missing provider entry classes in dex: " + ", ".join(missing))
          PY

      - name: Collect build artifacts
        run: |
          mkdir -p publish
          cp providers/*/build/*.flx publish/
          cp build/updater.json publish/updater.json
          cp build/updater.json publish/plugins.json

      - name: Publish builds branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: builds
          publish_dir: publish
          force_orphan: true
